name: Build and Deploy Wisecow to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: wisecow-cluster
  ECR_REPOSITORY: wisecow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        docker build -t wisecow:${{ github.sha }} .

    - name: Tag Docker image
      run: |
        docker tag wisecow:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/wisecow:${{ github.sha }}

    - name: Push image to ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/wisecow:${{ github.sha }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/wisecow \
        wisecow=${{ steps.login-ecr.outputs.registry }}/wisecow:${{ github.sha }} \
        -n wisecow

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/wisecow -n wisecow
