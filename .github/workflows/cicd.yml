name: Wisecow CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: wisecow-cluster
  ECR_REPOSITORY: wisecow
  NAMESPACE: wisecow
  DEPLOYMENT_NAME: wisecow-deployment
  CONTAINER_NAME: wisecow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2️⃣ Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3️⃣ Ensure ECR repository exists
    - name: Create ECR Repository if not exists
      run: |
        aws ecr describe-repositories \
        --repository-names $ECR_REPOSITORY \
        --region $AWS_REGION || \
        aws ecr create-repository \
        --repository-name $ECR_REPOSITORY \
        --region $AWS_REGION

    # 4️⃣ Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 5️⃣ Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t wisecow:${{ github.sha }} -t wisecow:latest .

    # 6️⃣ Tag Docker image
    - name: Tag Docker Image
      run: |
        docker tag wisecow:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

        docker tag wisecow:latest \
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

    # 7️⃣ Push Docker image to ECR
    - name: Push Image to ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

    # 8️⃣ Update kubeconfig for EKS
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
        --region $AWS_REGION \
        --name $EKS_CLUSTER_NAME

    # 9️⃣ Update Kubernetes deployment image
    - name: Deploy to EKS
      run: |
        kubectl set image deployment/$DEPLOYMENT_NAME \
        $CONTAINER_NAME=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
        -n $NAMESPACE

    # 🔟 Verify rollout
    - name: Verify Deployment
      run: |
        kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE

    # 1️⃣1️⃣ Rollback if deployment fails
    - name: Rollback if Failed
      if: failure()
      run: |
        kubectl rollout undo deployment/$DEPLOYMENT_NAME -n $NAMESPACE
